<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weather app</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   
  <div class="container">
    <div class="weather_app">
        <header class="weather_header">
          <p>WEATHER APP</p>

          <div class="search_area">
            <input type="text" id="user_city" placeholder="Enter your City..">
            <button id="input_search_btn">Search</button>
          </div>

        </header><!--weather_head-->

        <section class="main_section">

          <div class="temp_box">
            <!-- <p class="temp">34</p>
            <p class="clear">clear</p>
            <div class="city_name">Karachi</div>
              <div class="humidity">Humidity <span>99%</span></div> -->
          </div>
          
          <div class="calender_box">
            <!-- <p class="day">03</p>
            <p class="month">MAY</p>
            <p class="year">2026</p>
            <p class="week_day">Friday</p> -->
          </div>

        </section><!--main_section-->

        <section class="details">
             <div class="history">
              <div class="tabs">
              <div class="AfterDay01 tab_degree">35</div>
              <div class="tab_days"></div>
              </div>
              <div class="tabs">
              <div class="AfterDay02 tab_degree">35</div>
              <div class="tab_days"></div>
              </div>
              <div class="tabs">
              <div class="AfterDay03 tab_degree">35</div>
              <div class="tab_days"></div>
              </div>
              
             </div><!--history-->
        </section>

        <section class="city_not_found_err">
          <!-- <h3 id="error_message ">CITY NAME NOT FOUND!</h3> -->
        </section>
        
    </div>
  </div>
    <script src="app.js"></script>
</body>
</html>
